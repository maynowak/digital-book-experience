    <line x1="381" y1="325" x2="389" y2="300" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <line x1="381" y1="305" x2="389" y2="280" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <line x1="381" y1="285" x2="389" y2="260" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
