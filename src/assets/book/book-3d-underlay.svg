<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" fill="none">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a3142"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e121c"/>
      <stop offset="50%" stop-color="#161b28"/>
      <stop offset="100%" stop-color="#2a3142"/>
    </linearGradient>
    <linearGradient id="pages-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#252b3a"/>
      <stop offset="100%" stop-color="#1e2332"/>
    </linearGradient>
    <linearGradient id="pages-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252b3a"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
  </defs>

  <g transform="translate(10, 10) rotate(2)" opacity="0.85">
    <!-- Bottom page edge -->
    <path d="M0 540 L380 555 L380 565 L0 550 Z" fill="url(#pages-bottom)" opacity="0.4"/>
    <!-- Right page edge -->
    <path d="M380 555 L390 530 L390 40 L380 15 Z" fill="url(#pages-right)" opacity="0.4"/>
    <!-- Spine -->
    <path d="M0 10 L35 0 L35 535 L0 545 Z" fill="url(#spine)" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
    <!-- Front cover face -->
    <path d="M35 0 L380 15 L380 555 L35 540 Z" fill="url(#cover)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  </g>
</svg>
